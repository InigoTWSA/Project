<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile · PageSync</title>
    <link rel="stylesheet" href="../css/pagesync.css">
    <style>
        /* ── Page layout ─────────────────────────────────────────── */
        body.dashboard { padding: 0; }

        .profile-shell {
            max-width: 820px;
            margin: 0 auto;
            padding-bottom: 60px;
        }

        /* ── Top bar ─────────────────────────────────────────────── */
        .profile-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 28px;
            position: sticky;
            top: 0;
            z-index: 20;
            background: rgba(9,11,15,0.88);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .profile-topbar .brand {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
            font-weight: 700;
            text-decoration: none;
            color: #e6e7e8;
            letter-spacing: -0.02em;
        }

        .profile-topbar .brand-mark {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #3b7df3, #7d5cff);
            color: #fff;
            font-weight: 700;
            font-size: 14px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #8f97a5;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 8px 14px;
            cursor: pointer;
            text-decoration: none;
            transition: color 0.15s, background 0.15s;
        }

        .back-btn:hover { color: #e6e7e8; background: rgba(255,255,255,0.09); }

        /* ── Banner ──────────────────────────────────────────────── */
        .profile-banner {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #0f1628 0%, #1a0f2e 50%, #0d1520 100%);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .profile-banner img.banner-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .banner-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: background 0.2s, opacity 0.2s;
            gap: 8px;
            font-size: 14px;
            color: #fff;
            font-weight: 600;
        }

        .profile-banner:hover .banner-overlay {
            background: rgba(0,0,0,0.45);
            opacity: 1;
        }

        .banner-overlay .cam-icon { font-size: 22px; }

        /* ── Profile card under banner ───────────────────────────── */
        .profile-card {
            padding: 0 28px 28px;
            position: relative;
        }

        /* ── Avatar ──────────────────────────────────────────────── */
        .profile-avatar-wrap {
            position: relative;
            display: inline-block;
            margin-top: -44px;
            margin-bottom: 14px;
        }

        .profile-avatar {
            width: 88px;
            height: 88px;
            border-radius: 22px;
            border: 3px solid #090b0f;
            background: #16191f;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f3f5f9;
            font-size: 28px;
            font-weight: 700;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: box-shadow 0.18s;
        }

        .profile-avatar:hover { box-shadow: 0 0 0 2px #3b7df3; }

        .avatar-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: background 0.2s, opacity 0.2s;
            font-size: 24px;
        }

        .profile-avatar:hover .avatar-overlay {
            background: rgba(0,0,0,0.5);
            opacity: 1;
        }

        /* ── Profile info area ───────────────────────────────────── */
        .profile-info-row {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .profile-names h1 {
            font-size: 22px;
            font-weight: 700;
            color: #f0f2f5;
            margin-bottom: 2px;
        }

        .profile-names .username-handle {
            font-size: 14px;
            color: #606880;
        }

        .edit-profile-btn {
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.05);
            color: #d4d8e2;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
            white-space: nowrap;
        }

        .edit-profile-btn:hover {
            background: rgba(255,255,255,0.09);
            border-color: rgba(255,255,255,0.2);
        }

        .edit-profile-btn.active {
            background: #3b7df3;
            border-color: #3b7df3;
            color: #fff;
        }

        /* ── Bio ─────────────────────────────────────────────────── */
        .profile-bio {
            font-size: 14px;
            color: #9aa0ad;
            line-height: 1.7;
            margin-bottom: 28px;
            max-width: 560px;
            white-space: pre-wrap;
        }

        .profile-bio.empty { color: #484f60; font-style: italic; }

        /* ── Divider ─────────────────────────────────────────────── */
        .section-divider {
            border: none;
            border-top: 1px solid rgba(255,255,255,0.07);
            margin: 0 0 28px;
        }

        /* ── Section heading ─────────────────────────────────────── */
        .profile-section-title {
            font-size: 16px;
            font-weight: 700;
            color: #e2e5ea;
            margin-bottom: 16px;
        }

        /* ── Favourite books grid ────────────────────────────────── */
        .fav-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-bottom: 32px;
        }

        @media (max-width: 600px) {
            .fav-grid { grid-template-columns: repeat(3, 1fr); }
        }

        .fav-slot {
            aspect-ratio: 2/3;
            border-radius: 12px;
            border: 2px dashed rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.025);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            position: relative;
            overflow: hidden;
        }

        .fav-slot:hover {
            border-color: rgba(59,125,243,0.4);
            background: rgba(59,125,243,0.06);
        }

        .fav-slot.filled {
            border-style: solid;
            border-color: rgba(255,255,255,0.08);
        }

        .fav-slot .slot-cover {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            border-radius: 10px;
        }

        .fav-slot .slot-label {
            font-size: 11px;
            color: #404860;
            text-align: center;
            padding: 0 6px;
            line-height: 1.4;
            transition: color 0.15s;
        }

        .fav-slot:hover .slot-label { color: #6070a0; }

        .fav-slot .slot-plus { font-size: 20px; color: #303550; transition: color 0.15s; }
        .fav-slot:hover .slot-plus { color: #3b7df3; }

        /* Filled slot overlay on hover */
        .fav-slot .slot-hover-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0);
            display: flex;
            align-items: flex-end;
            padding: 8px;
            border-radius: 10px;
            opacity: 0;
            transition: background 0.2s, opacity 0.2s;
        }

        .fav-slot.filled:hover .slot-hover-overlay {
            background: rgba(0,0,0,0.55);
            opacity: 1;
        }

        .slot-hover-title {
            font-size: 11px;
            font-weight: 600;
            color: #fff;
            line-height: 1.3;
            word-break: break-word;
        }

        .slot-remove {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: rgba(0,0,0,0.7);
            border: none;
            color: #ccc;
            font-size: 12px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2;
            transition: background 0.15s;
        }

        .fav-slot.filled:hover .slot-remove {
            display: flex;
        }

        .slot-remove:hover { background: rgba(220,60,60,0.85); color: #fff; }

        /* ── Edit panel ──────────────────────────────────────────── */
        .edit-panel {
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            transition: max-height 0.4s ease, opacity 0.3s ease;
        }

        .edit-panel.open {
            max-height: 700px;
            opacity: 1;
        }

        .edit-inner {
            background: rgba(255,255,255,0.025);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 18px;
            padding: 24px;
            margin-bottom: 28px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .edit-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #606880;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .edit-group input[type="text"],
        .edit-group textarea {
            width: 100%;
            background: #0e1016;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 13px 16px;
            color: #eceeef;
            font-size: 14px;
            resize: vertical;
            font-family: inherit;
            line-height: 1.6;
            transition: border-color 0.15s;
        }

        .edit-group input[type="text"]:focus,
        .edit-group textarea:focus {
            outline: none;
            border-color: rgba(59,125,243,0.45);
        }

        .edit-group textarea { min-height: 90px; }

        .edit-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .btn-save {
            padding: 11px 24px;
            border-radius: 12px;
            border: none;
            background: #3b7df3;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-save:hover { background: #5a93f7; }

        .btn-cancel {
            padding: 11px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.04);
            color: #9aa0ad;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-cancel:hover { background: rgba(255,255,255,0.08); color: #cdd0d8; }

        /* ── Book picker modal ───────────────────────────────────── */
        .picker-layer {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: none;
            align-items: flex-start;
            justify-content: center;
            z-index: 60;
            padding: 60px 20px 20px;
            overflow-y: auto;
        }

        .picker-layer.open { display: flex; animation: fadeIn 0.15s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .picker-card {
            width: min(600px, 100%);
            background: #13161c;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.55);
            overflow: hidden;
            animation: slideDown 0.18s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .picker-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 18px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }

        .picker-search-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #f0f2f5;
            font-size: 16px;
            caret-color: #3b7df3;
        }

        .picker-search-input::placeholder { color: #4a5060; }

        .picker-close {
            background: none;
            border: none;
            color: #606570;
            font-size: 18px;
            cursor: pointer;
            padding: 6px;
            border-radius: 8px;
            transition: color 0.15s;
        }

        .picker-close:hover { color: #c0c5cc; }

        .picker-body {
            max-height: 55vh;
            overflow-y: auto;
            padding: 12px 16px 16px;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.1) transparent;
        }

        .picker-hint {
            text-align: center;
            padding: 32px 20px;
            color: #404860;
            font-size: 14px;
        }

        .picker-result {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 10px 12px;
            border-radius: 14px;
            cursor: pointer;
            transition: background 0.15s;
            border: 1px solid transparent;
        }

        .picker-result:hover {
            background: rgba(59,125,243,0.08);
            border-color: rgba(59,125,243,0.15);
        }

        .picker-cover {
            width: 40px;
            height: 56px;
            border-radius: 8px;
            background: linear-gradient(135deg, #1e2435, #151925);
            background-size: cover;
            background-position: center;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #404860;
            font-size: 13px;
            font-weight: 700;
        }

        .picker-info { flex: 1; min-width: 0; }

        .picker-title {
            font-size: 14px;
            font-weight: 600;
            color: #e0e4ee;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .picker-author {
            font-size: 12px;
            color: #606880;
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .picker-badge {
            font-size: 11px;
            padding: 3px 9px;
            border-radius: 999px;
            background: rgba(59,125,243,0.12);
            color: #7aabff;
            flex-shrink: 0;
        }

        .picker-spinner {
            width: 24px;
            height: 24px;
            border: 2px solid rgba(255,255,255,0.08);
            border-top-color: #3b7df3;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 32px auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Toast ───────────────────────────────────────────────── */
        .toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #1f2430;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 12px 22px;
            font-size: 14px;
            color: #d0d5de;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            opacity: 0;
            transition: opacity 0.22s, transform 0.22s;
            pointer-events: none;
            white-space: nowrap;
            z-index: 99;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* hidden file inputs */
        #avatar-file-input,
        #banner-file-input { display: none; }
    </style>
</head>
<body class="dashboard">

    <!-- Top bar -->
    <header class="profile-topbar">
        <a class="brand" href="home.html">
            <span class="brand-mark">PS</span>
            <span>PageSync</span>
        </a>
        <a class="back-btn" href="home.html">← Back to home</a>
    </header>

    <div class="profile-shell">

        <!-- Banner -->
        <div class="profile-banner" id="banner-zone" title="Click to change banner">
            <img class="banner-img" id="banner-img" src="" alt="" style="display:none">
            <div class="banner-overlay">
                <span class="cam-icon">🖼️</span>
                Change banner
            </div>
        </div>

        <div class="profile-card">

            <!-- Avatar -->
            <div class="profile-avatar-wrap">
                <div class="profile-avatar" id="profile-avatar" title="Click to change profile picture">
                    <span id="avatar-initials">PS</span>
                    <div class="avatar-overlay">📷</div>
                </div>
            </div>

            <!-- Name + Edit button -->
            <div class="profile-info-row">
                <div class="profile-names">
                    <h1 id="display-name-view">Reader</h1>
                    <span class="username-handle" id="username-view">@username</span>
                </div>
                <button class="edit-profile-btn" id="edit-toggle-btn">Edit profile</button>
            </div>

            <!-- Bio -->
            <p class="profile-bio empty" id="bio-view">No bio yet.</p>

            <!-- ── Edit panel ── -->
            <div class="edit-panel" id="edit-panel">
                <div class="edit-inner">
                    <div class="edit-group">
                        <label>Display name</label>
                        <input type="text" id="edit-display-name" placeholder="Your name" maxlength="40">
                    </div>
                    <div class="edit-group">
                        <label>Username</label>
                        <input type="text" id="edit-username" placeholder="username" maxlength="30">
                    </div>
                    <div class="edit-group">
                        <label>Bio</label>
                        <textarea id="edit-bio" placeholder="Tell the world a little about yourself…" maxlength="200"></textarea>
                    </div>
                    <div class="edit-actions">
                        <button class="btn-cancel" id="edit-cancel-btn">Cancel</button>
                        <button class="btn-save" id="edit-save-btn">Save changes</button>
                    </div>
                </div>
            </div>

            <hr class="section-divider">

            <!-- Favourite books -->
            <p class="profile-section-title">Favourite books</p>

            <div class="fav-grid" id="fav-grid">
                <!-- 5 slots, filled by JS -->
            </div>

        </div>
    </div>

    <!-- Book picker modal -->
    <div class="picker-layer" id="picker-layer">
        <div class="picker-card">
            <div class="picker-header">
                <span style="font-size:20px;color:#5a6070;flex-shrink:0">⌕</span>
                <input class="picker-search-input" id="picker-input" placeholder="Search for a book, manga or comic…" autocomplete="off">
                <button class="picker-close" id="picker-close">✕</button>
            </div>
            <div class="picker-body" id="picker-body">
                <p class="picker-hint">Start typing to search</p>
            </div>
        </div>
    </div>

    <!-- Hidden file inputs -->
    <input type="file" id="avatar-file-input" accept="image/*">
    <input type="file" id="banner-file-input" accept="image/*">

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script type="module">
        import { onAuthStateChange } from './firebase.js';

        /* ── State ──────────────────────────────────────────────── */
        let currentUser = null;
        let activeSlotIndex = null;

        const MAX_SLOTS = 5;
        const KEY = uid => `ps_profile_${uid}`;

        function loadProfile(uid) {
            try { return JSON.parse(localStorage.getItem(KEY(uid))) || {}; } catch { return {}; }
        }

        function saveProfile(uid, data) {
            localStorage.setItem(KEY(uid), JSON.stringify(data));
        }

        /* ── DOM refs ───────────────────────────────────────────── */
        const avatarEl        = document.getElementById('profile-avatar');
        const avatarInitials  = document.getElementById('avatar-initials');
        const bannerZone      = document.getElementById('banner-zone');
        const bannerImg       = document.getElementById('banner-img');
        const displayNameView = document.getElementById('display-name-view');
        const usernameView    = document.getElementById('username-view');
        const bioView         = document.getElementById('bio-view');

        const editToggleBtn   = document.getElementById('edit-toggle-btn');
        const editPanel       = document.getElementById('edit-panel');
        const editDisplayName = document.getElementById('edit-display-name');
        const editUsername    = document.getElementById('edit-username');
        const editBio         = document.getElementById('edit-bio');
        const editSaveBtn     = document.getElementById('edit-save-btn');
        const editCancelBtn   = document.getElementById('edit-cancel-btn');

        const favGrid         = document.getElementById('fav-grid');

        const pickerLayer     = document.getElementById('picker-layer');
        const pickerInput     = document.getElementById('picker-input');
        const pickerBody      = document.getElementById('picker-body');
        const pickerClose     = document.getElementById('picker-close');

        const avatarFileInput = document.getElementById('avatar-file-input');
        const bannerFileInput = document.getElementById('banner-file-input');
        const toastEl         = document.getElementById('toast');

        /* ── Auth ───────────────────────────────────────────────── */
        onAuthStateChange(user => {
            if (!user) { window.location.href = 'login.html'; return; }
            currentUser = user;
            renderFromStorage();
        });

        function renderFromStorage() {
            const uid = currentUser.uid;
            const p   = loadProfile(uid);

            // Display name / username
            const displayName = p.displayName || currentUser.displayName || 'Reader';
            const username    = p.username    || currentUser.email?.split('@')[0] || 'username';
            displayNameView.textContent = displayName;
            usernameView.textContent    = `@${username}`;

            // Bio
            if (p.bio) {
                bioView.textContent = p.bio;
                bioView.classList.remove('empty');
            } else {
                bioView.textContent = 'No bio yet.';
                bioView.classList.add('empty');
            }

            // Avatar
            if (p.avatarDataUrl) {
                avatarEl.style.backgroundImage = `url('${p.avatarDataUrl}')`;
                avatarInitials.style.display = 'none';
                // Also update topbar avatar on home via localStorage
                localStorage.setItem(`ps_avatar_${uid}`, p.avatarDataUrl);
            } else {
                const initials = displayName.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2) || 'PS';
                avatarInitials.textContent   = initials;
                avatarInitials.style.display = '';
                avatarEl.style.backgroundImage = '';
            }

            // Also persist username for home.html menu
            localStorage.setItem(`ps_username_${uid}`, displayName);

            // Banner
            if (p.bannerDataUrl) {
                bannerImg.src = p.bannerDataUrl;
                bannerImg.style.display = 'block';
            }

            // Fav books
            renderFavGrid(p.favBooks || []);
        }

        /* ── Edit panel toggle ──────────────────────────────────── */
        editToggleBtn.addEventListener('click', () => {
            const isOpen = editPanel.classList.toggle('open');
            editToggleBtn.textContent = isOpen ? 'Done' : 'Edit profile';
            editToggleBtn.classList.toggle('active', isOpen);

            if (isOpen) {
                const p = loadProfile(currentUser.uid);
                editDisplayName.value = p.displayName || currentUser.displayName || '';
                editUsername.value    = p.username    || currentUser.email?.split('@')[0] || '';
                editBio.value         = p.bio || '';
            }
        });

        editCancelBtn.addEventListener('click', () => {
            editPanel.classList.remove('open');
            editToggleBtn.textContent = 'Edit profile';
            editToggleBtn.classList.remove('active');
        });

        editSaveBtn.addEventListener('click', () => {
            const uid = currentUser.uid;
            const p   = loadProfile(uid);
            p.displayName = editDisplayName.value.trim() || p.displayName;
            p.username    = editUsername.value.trim().toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'') || p.username;
            p.bio         = editBio.value.trim();
            saveProfile(uid, p);
            renderFromStorage();
            editPanel.classList.remove('open');
            editToggleBtn.textContent = 'Edit profile';
            editToggleBtn.classList.remove('active');
            showToast('Profile saved ✓');
        });

        /* ── Avatar upload ──────────────────────────────────────── */
        avatarEl.addEventListener('click', () => avatarFileInput.click());
        avatarFileInput.addEventListener('change', e => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                const uid = currentUser.uid;
                const p   = loadProfile(uid);
                p.avatarDataUrl = ev.target.result;
                saveProfile(uid, p);
                renderFromStorage();
                showToast('Profile picture updated ✓');
            };
            reader.readAsDataURL(file);
            e.target.value = '';
        });

        /* ── Banner upload ──────────────────────────────────────── */
        bannerZone.addEventListener('click', () => bannerFileInput.click());
        bannerFileInput.addEventListener('change', e => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                const uid = currentUser.uid;
                const p   = loadProfile(uid);
                p.bannerDataUrl = ev.target.result;
                saveProfile(uid, p);
                bannerImg.src = ev.target.result;
                bannerImg.style.display = 'block';
                showToast('Banner updated ✓');
            };
            reader.readAsDataURL(file);
            e.target.value = '';
        });

        /* ── Favourite books grid ───────────────────────────────── */
        function renderFavGrid(favBooks) {
            favGrid.innerHTML = '';
            for (let i = 0; i < MAX_SLOTS; i++) {
                const book = favBooks[i] || null;
                const slot = document.createElement('div');
                slot.className = 'fav-slot' + (book ? ' filled' : '');
                slot.dataset.index = i;

                if (book) {
                    if (book.cover) {
                        const cover = document.createElement('div');
                        cover.className = 'slot-cover';
                        cover.style.backgroundImage = `url('${book.cover}')`;
                        slot.appendChild(cover);
                    } else {
                        // Colour placeholder
                        const colours = ['#1a2040','#201528','#0f2018','#201a0a','#1a1020'];
                        slot.style.background = colours[i % colours.length];
                        const lbl = document.createElement('span');
                        lbl.className = 'slot-label';
                        lbl.style.zIndex = 1;
                        lbl.style.position = 'relative';
                        lbl.textContent = book.title.slice(0, 18);
                        slot.appendChild(lbl);
                    }

                    // Hover overlay with title
                    const hov = document.createElement('div');
                    hov.className = 'slot-hover-overlay';
                    const hovTitle = document.createElement('span');
                    hovTitle.className = 'slot-hover-title';
                    hovTitle.textContent = book.title;
                    hov.appendChild(hovTitle);
                    slot.appendChild(hov);

                    // Remove button
                    const rem = document.createElement('button');
                    rem.className = 'slot-remove';
                    rem.textContent = '✕';
                    rem.title = 'Remove';
                    rem.addEventListener('click', e => {
                        e.stopPropagation();
                        removeFav(i);
                    });
                    slot.appendChild(rem);

                    // Click filled slot → replace
                    slot.addEventListener('click', () => openPicker(i));
                } else {
                    const plus = document.createElement('span');
                    plus.className = 'slot-plus';
                    plus.textContent = '+';
                    const lbl = document.createElement('span');
                    lbl.className = 'slot-label';
                    lbl.textContent = 'Add book';
                    slot.appendChild(plus);
                    slot.appendChild(lbl);
                    slot.addEventListener('click', () => openPicker(i));
                }

                favGrid.appendChild(slot);
            }
        }

        function removeFav(index) {
            const uid = currentUser.uid;
            const p   = loadProfile(uid);
            const favBooks = p.favBooks || [];
            favBooks.splice(index, 1);
            p.favBooks = favBooks;
            saveProfile(uid, p);
            renderFavGrid(p.favBooks);
            showToast('Removed from favourites');
        }

        /* ── Book picker ────────────────────────────────────────── */
        function openPicker(slotIndex) {
            activeSlotIndex = slotIndex;
            pickerInput.value = '';
            pickerBody.innerHTML = '<p class="picker-hint">Start typing to search</p>';
            pickerLayer.classList.add('open');
            document.body.style.overflow = 'hidden';
            setTimeout(() => pickerInput.focus(), 80);
        }

        function closePicker() {
            pickerLayer.classList.remove('open');
            document.body.style.overflow = '';
            activeSlotIndex = null;
        }

        pickerClose.addEventListener('click', closePicker);
        pickerLayer.addEventListener('click', e => { if (e.target === pickerLayer) closePicker(); });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closePicker(); });

        let pickerDebounce = null;
        pickerInput.addEventListener('input', () => {
            clearTimeout(pickerDebounce);
            const q = pickerInput.value.trim();
            if (!q) { pickerBody.innerHTML = '<p class="picker-hint">Start typing to search</p>'; return; }
            pickerDebounce = setTimeout(() => runPickerSearch(q), 500);
        });

        async function runPickerSearch(q) {
            pickerBody.innerHTML = '<div class="picker-spinner"></div>';
            try {
                const res  = await fetch(`/api/search?q=${encodeURIComponent(q)}&source=all`);
                const data = await res.json();
                const results = (data.results || []).slice(0, 20);
                if (!results.length) {
                    pickerBody.innerHTML = '<p class="picker-hint">No results found.</p>';
                    return;
                }
                pickerBody.innerHTML = '';
                results.forEach(r => {
                    const row = document.createElement('div');
                    row.className = 'picker-result';

                    const cover = document.createElement('div');
                    cover.className = 'picker-cover';
                    if (r.cover) {
                        cover.style.backgroundImage = `url('${r.cover}')`;
                        cover.style.backgroundSize  = 'cover';
                        cover.style.backgroundPosition = 'center';
                    } else {
                        cover.textContent = (r.title || '??').slice(0,2).toUpperCase();
                    }

                    const info = document.createElement('div');
                    info.className = 'picker-info';
                    const titleEl = document.createElement('div');
                    titleEl.className = 'picker-title';
                    titleEl.textContent = r.title;
                    const authorEl = document.createElement('div');
                    authorEl.className = 'picker-author';
                    authorEl.textContent = r.author;
                    info.appendChild(titleEl);
                    info.appendChild(authorEl);

                    const badge = document.createElement('span');
                    badge.className = 'picker-badge';
                    badge.textContent = r.sourceLabel || 'Book';

                    row.appendChild(cover);
                    row.appendChild(info);
                    row.appendChild(badge);

                    row.addEventListener('click', () => pickBook(r));
                    pickerBody.appendChild(row);
                });
            } catch {
                pickerBody.innerHTML = '<p class="picker-hint">Search failed. Check your connection.</p>';
            }
        }

        function pickBook(book) {
            if (activeSlotIndex === null) return;
            const uid = currentUser.uid;
            const p   = loadProfile(uid);
            const favBooks = p.favBooks || [];
            favBooks[activeSlotIndex] = { title: book.title, author: book.author, cover: book.cover || null };
            p.favBooks = favBooks;
            saveProfile(uid, p);
            renderFavGrid(p.favBooks);
            closePicker();
            showToast(`"${book.title}" added to favourites ✓`);
        }

        /* ── Toast helper ───────────────────────────────────────── */
        let toastTimer;
        function showToast(msg) {
            toastEl.textContent = msg;
            toastEl.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2600);
        }
    </script>
</body>
</html>
